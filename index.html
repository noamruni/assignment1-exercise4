<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rolling Ball Obstacle Course</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body class="bg-black">
    <div id="ui" class="fixed top-0 left-0 w-full p-4 flex justify-between items-start z-10">
        <div class="bg-black/50 backdrop-blur-sm rounded-lg p-4 text-white">
            <div class="text-lg font-bold">Score: <span id="score">0</span></div>
            <div class="text-sm text-gray-300">Lives: <span id="lives">⭐⭐⭐</span></div>
        </div>
        <div class="bg-black/50 backdrop-blur-sm rounded-lg p-4 text-white text-sm">
            <div class="font-bold mb-1">Controls</div>
            <div>↑/W - Forward</div>
            <div>↓/S - Backward</div>
            <div>←/A - Left</div>
            <div>→/D - Right</div>
            <div>Space - Jump</div>
        </div>
    </div>
    
    <div id="startScreen" class="fixed inset-0 bg-black/80 flex items-center justify-center z-20">
        <div class="text-center text-white max-h-[90vh] overflow-y-auto flex flex-col items-center">
            <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-500">Ball Runner</h1>
            <p class="text-xl mb-8 text-gray-300">Roll through the obstacle course!</p>
            <button id="startBtn" class="px-8 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 rounded-full text-xl font-bold hover:scale-105 transition-transform">
                Start Game
            </button>

            <div class="mt-8 bg-black/50 rounded-lg p-4 inline-block">
                <h2 class="text-2xl font-bold mb-4 text-cyan-400">🏆 Top 10 Leaderboard</h2>
                <table class="text-left text-sm">
                    <thead class="border-b border-cyan-400">
                        <tr>
                            <th class="pr-4">Rank</th>
                            <th class="pr-4">Name</th>
                            <th class="pr-4">Score</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr><td colspan="3" class="text-gray-400">No scores yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="gameOverScreen" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-20">
        <div class="text-center text-white max-h-[90vh] overflow-y-auto">
            <h1 class="text-5xl font-bold mb-4 text-red-500">Game Over</h1>
            <p class="text-2xl mb-2">Final Score: <span id="finalScore">0</span></p>
            <p class="text-xl mb-8 text-gray-400">Distance: <span id="distance">0</span>m</p>

            <button id="restartBtn" class="px-8 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 rounded-full text-xl font-bold hover:scale-105 transition-transform">
                Play Again
            </button>
        </div>
    </div>

    <div id="winScreen" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-20">
        <div class="text-center text-white">
            <h1 class="text-5xl font-bold mb-4 text-green-500">You Win!</h1>
            <p class="text-2xl mb-2">Final Score: <span id="winScore">0</span></p>
            <p class="text-xl mb-8 text-gray-400">🎉 Congratulations! 🎉</p>
            <button id="playAgainBtn" class="px-8 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 rounded-full text-xl font-bold hover:scale-105 transition-transform">
                Play Again
            </button>
        </div>
    </div>

    <script>
        // Game variables
        let scene, camera, renderer;
        let ball, ballVelocity = new THREE.Vector3();
        let platforms = [], obstacles = [], collectibles = [];
        let enemies = [], bullets = [];
        let platformBonuses = []; // Track which platforms have bonuses
        let collectedBonuses = new Set(); // Track which bonuses we've collected this game
        let score = 0, lives = 3;
        let gameStarted = false, gameOver = false;
        let keys = {};
        let clock = new THREE.Clock();
        const courseLength = 200;

        // Scoring tracking
        let deepestZ = 0; // Most negative Z reached (starting at 0)
        let gameStartTime = 0; // Track when game started for speed bonus

        // Metal texture for moving walls
        let metalWallTexture = null;

        function loadMetalTexture() {
            if (metalWallTexture) return metalWallTexture;

            try {
                const textureLoader = new THREE.TextureLoader();
                // Use a reliable metal texture from Three.js CDN
                metalWallTexture = textureLoader.load(
                    'https://threejs.org/examples/textures/brick_diffuse.jpg',
                    (texture) => {
                        texture.wrapS = THREE.RepeatWrapping;
                        texture.wrapT = THREE.RepeatWrapping;
                        texture.repeat.set(3, 2);
                        // Brighten texture by adjusting encoding
                        texture.encoding = THREE.sRGBEncoding;
                        console.log('[TEXTURE] Metal wall texture loaded successfully');
                    },
                    undefined,
                    (error) => {
                        console.warn('[TEXTURE] Failed to load metal texture:', error);
                        metalWallTexture = null; // Reset on error to use fallback
                    }
                );
                return metalWallTexture;
            } catch (e) {
                console.error('[TEXTURE] Error loading metal texture:', e);
                return null;
            }
        }
        
        // Physics constants
        const gravity = -30;
        const moveForce = 50;
        const jumpForce = 15;
        const friction = 0.98;
        const maxSpeed = 20;

        // Simple GLTF helpers for jellyfish pillars
        let jellyTemplate = null;
        const jellyInstances = [];

        // Model loading verification system
        const ModelVerification = {
            loadedModels: {},
            renderedModels: {},

            markLoaded(modelName, success, details = {}) {
                this.loadedModels[modelName] = {
                    success,
                    timestamp: Date.now(),
                    ...details
                };
                console.log(`[MODEL VERIFY] ${modelName} loaded: ${success}`, details);
            },

            markRendered(modelName, instanceCount) {
                this.renderedModels[modelName] = {
                    instanceCount,
                    timestamp: Date.now()
                };
                console.log(`[MODEL VERIFY] ${modelName} rendered: ${instanceCount} instances`);
            },

            getReport() {
                return {
                    loaded: this.loadedModels,
                    rendered: this.renderedModels,
                    summary: `Loaded: ${Object.keys(this.loadedModels).length}, Rendered: ${Object.keys(this.renderedModels).length}`
                };
            },

            logReport() {
                console.log('=== MODEL VERIFICATION REPORT ===');
                console.table(this.loadedModels);
                console.table(this.renderedModels);
                console.log(this.getReport().summary);
            }
        };

        function loadJellyModel(url) {
            return new Promise((resolve, reject) => {
                try {
                    const loader = new THREE.GLTFLoader();
                    loader.load(url, (gltf) => {
                        jellyTemplate = gltf.scene;
                        jellyTemplate.traverse(n => {
                            if (n.isMesh) {
                                n.castShadow = true;
                                n.receiveShadow = true;
                                // Brighten the jellyfish material
                                if (n.material) {
                                    if (n.material.emissive) {
                                        n.material.emissive.setHex(0x4488ff);
                                        n.material.emissiveIntensity = 0.6;
                                    }
                                    if (n.material.metalness !== undefined) {
                                        n.material.metalness = 0.5;
                                    }
                                    if (n.material.roughness !== undefined) {
                                        n.material.roughness = 0.4;
                                    }
                                }
                            }
                        });
                        ModelVerification.markLoaded('jellyfish', true, { source: url });
                        console.log('[GLTF] jelly loaded successfully');
                        resolve(true);
                    }, undefined, (err) => {
                        console.error('jelly load error', err);
                        ModelVerification.markLoaded('jellyfish', false, { error: err.message });
                        reject(err);
                    });
                } catch (e) {
                    console.error('GLTF loader error', e);
                    ModelVerification.markLoaded('jellyfish', false, { error: e.message });
                    reject(e);
                }
            });
        }

        function spawnJelly(x, y, z, scale = 1) {
            if (!jellyTemplate) {
                console.warn('[PILLAR] jellyTemplate is null, cannot spawn jelly');
                return null;
            }
            const clone = THREE.SkeletonUtils ? THREE.SkeletonUtils.clone(jellyTemplate) : jellyTemplate.clone();
            clone.position.set(x, y, z);
            clone.scale.setScalar(scale * 2); // make it larger
            scene.add(clone);
            jellyInstances.push(clone);
            return clone;
        }

        // Leaderboard management
        const LEADERBOARD_KEY = 'ballRunnerLeaderboard';
        const MAX_SCORES = 10;

        // Funny name generator
        const adjectives = ['Speedy', 'Mighty', 'Wild', 'Crazy', 'Fearless', 'Sneaky', 'Bouncy', 'Slick', 'Thunder', 'Cosmic'];
        const nouns = ['Roller', 'Runner', 'Champion', 'Hero', 'Legend', 'Beast', 'Phoenix', 'Ninja', 'Comet', 'Shadow'];

        function generateFunnyName() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const num = Math.floor(Math.random() * 1000);
            return `${adj} ${noun} ${num}`;
        }

        function getLeaderboard() {
            const stored = localStorage.getItem(LEADERBOARD_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveLeaderboard(scores) {
            localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(scores));
        }

        function addScore(scoreValue) {
            const leaderboard = getLeaderboard();
            leaderboard.push({
                name: generateFunnyName(),
                score: scoreValue,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            });

            // Sort by score descending
            leaderboard.sort((a, b) => b.score - a.score);

            // Keep only top MAX_SCORES
            const topScores = leaderboard.slice(0, MAX_SCORES);
            saveLeaderboard(topScores);

            console.log('[LEADERBOARD] Added score:', scoreValue, 'Position:', leaderboard.indexOf(leaderboard.find(s => s.score === scoreValue && s.date === leaderboard.find(s => s.score === scoreValue).date)) + 1);
            return leaderboard.indexOf(leaderboard.find(s => s.score === scoreValue && s.date === leaderboard.find(s => s.score === scoreValue).date)) + 1;
        }

        function renderLeaderboard() {
            const leaderboard = getLeaderboard();
            const tbody = document.getElementById('leaderboardBody');

            if (leaderboard.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-gray-400">No scores yet</td></tr>';
                return;
            }

            tbody.innerHTML = leaderboard.map((entry, index) => `
                <tr class="border-b border-gray-700 ${index === 0 ? 'text-yellow-400 font-bold' : index === 1 ? 'text-gray-300' : index === 2 ? 'text-orange-400' : ''}">
                    <td class="pr-4 py-1">#${index + 1}</td>
                    <td class="pr-4 py-1">${entry.name || 'Player'}</td>
                    <td class="pr-4 py-1">${entry.score}</td>
                    <td class="py-1 text-xs text-gray-400">${entry.date}</td>
                </tr>
            `).join('');
        }

        // Audio management system
        const sounds = {};
        let musicPlaying = false;

        function loadSound(name, filepath) {
            const audio = new Audio(filepath);
            audio.volume = 0.5;
            sounds[name] = audio;
        }

        function playSound(name, volume = null) {
            if (sounds[name]) {
                try {
                    const audio = sounds[name].cloneNode();
                    if (volume !== null) audio.volume = volume;
                    audio.play().catch(e => console.warn(`Sound ${name} failed to play:`, e));
                } catch (e) {
                    console.warn(`Error playing sound ${name}:`, e);
                }
            }
        }

        function playSoundWithCooldown(name, cooldownMs = 100) {
            if (!sounds[name + '_lastPlay']) sounds[name + '_lastPlay'] = 0;
            const now = Date.now();
            if (now - sounds[name + '_lastPlay'] > cooldownMs) {
                playSound(name);
                sounds[name + '_lastPlay'] = now;
            }
        }

        function playBackgroundMusic() {
            if (sounds.music && !musicPlaying) {
                try {
                    sounds.music.currentTime = 0;
                    sounds.music.loop = true;
                    sounds.music.volume = 0.3;
                    sounds.music.play().catch(e => console.warn('Music failed to play:', e));
                    musicPlaying = true;
                } catch (e) {
                    console.warn('Error playing music:', e);
                }
            }
        }

        function stopBackgroundMusic() {
            if (sounds.music) {
                sounds.music.pause();
                sounds.music.currentTime = 0;
                musicPlaying = false;
            }
        }

        // Initialize Three.js
        const starfieldData = {
            canvas: null,
            ctx: null,
            texture: null,
            stars: [],
            time: 0
        };

        function createStarfieldBackground() {
            try {
                // Create procedural starfield background
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                starfieldData.canvas = canvas;
                starfieldData.ctx = ctx;

                // Generate star data
                const starCount = 200;
                const colors = ['#FFFFFF', '#AACCFF', '#FFDDAA', '#FF69B4', '#00FFFF', '#FFD700'];

                for (let i = 0; i < starCount; i++) {
                    starfieldData.stars.push({
                        x: Math.random() * 512,
                        y: Math.random() * 512,
                        size: Math.random() * 1.5,
                        baseAlpha: Math.random() * 0.5 + 0.3,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        twinkleSpeed: Math.random() * 3 + 1,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                starfieldData.texture = texture;

                // Draw initial frame
                updateStarfield(0);
                return texture;
            } catch (e) {
                console.error('Error creating starfield:', e);
                return new THREE.Color(0x1a1a2e);
            }
        }

        function updateStarfield(deltaTime) {
            if (!starfieldData.canvas) return;

            starfieldData.time += deltaTime;
            const ctx = starfieldData.ctx;

            // Clear canvas
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 512, 512);

            // Draw stars with twinkling and color changes
            starfieldData.stars.forEach(star => {
                // Twinkling animation using sine wave
                const twinkle = Math.sin(starfieldData.time * star.twinkleSpeed + star.twinklePhase) * 0.5 + 0.5;
                const alpha = star.baseAlpha + twinkle * 0.5;

                // Color cycling (lerp between colors)
                const hue = (starfieldData.time * 0.3 + star.twinklePhase) % (Math.PI * 2);
                const colorRotation = Math.floor((hue / (Math.PI * 2)) * 6) % 6;

                ctx.fillStyle = star.color;
                ctx.globalAlpha = alpha;
                ctx.fillRect(star.x, star.y, star.size, star.size);

                // Add glow effect occasionally
                if (alpha > 0.7) {
                    ctx.globalAlpha = alpha * 0.3;
                    ctx.fillRect(star.x - 1, star.y - 1, star.size + 2, star.size + 2);
                }
                ctx.globalAlpha = 1;
            });

            // Add nebula effect
            const gradient = ctx.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, 'rgba(100, 50, 150, 0.1)');
            gradient.addColorStop(0.5, 'rgba(50, 100, 150, 0.05)');
            gradient.addColorStop(1, 'rgba(100, 50, 150, 0.1)');
            ctx.fillStyle = gradient;
            ctx.globalAlpha = 0.5 + Math.sin(starfieldData.time * 0.5) * 0.3;
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalAlpha = 1;

            if (starfieldData.texture) {
                starfieldData.texture.needsUpdate = true;
            }
        }

async function init() {
            // Load all sounds
            loadSound('jump', 'sounds/jump.mp3');
            loadSound('hit', 'sounds/hit.mp3');
            loadSound('fall', 'sounds/fall.mp3');
            loadSound('collect', 'sounds/collect.mp3');
            loadSound('shoot', 'sounds/shoot.mp3');
            loadSound('gameover', 'sounds/gameover.mp3');
            loadSound('click', 'sounds/click.mp3');
            loadSound('music', 'sounds/music.mp3');

            // Scene
            scene = new THREE.Scene();

            // Create starfield background texture
            const starfieldTexture = createStarfieldBackground();
            scene.background = starfieldTexture;
            scene.fog = new THREE.Fog(0x1a1a2e, 50, 150);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(20, 50, 20);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 200;
            directionalLight.shadow.camera.left = -100;
            directionalLight.shadow.camera.right = 100;
            directionalLight.shadow.camera.top = 100;
            directionalLight.shadow.camera.bottom = -100;
            scene.add(directionalLight);

            // Add colored point lights for atmosphere
            const pinkLight = new THREE.PointLight(0xff69b4, 1.2, 60);
            pinkLight.position.set(-10, 15, -30);
            scene.add(pinkLight);

            const cyanLight = new THREE.PointLight(0x00ffff, 1.2, 60);
            cyanLight.position.set(10, 15, -60);
            scene.add(cyanLight);

            // Additional atmospheric lights
            const purpleLight = new THREE.PointLight(0x9D4EDD, 0.8, 50);
            purpleLight.position.set(-15, 20, -100);
            scene.add(purpleLight);

            const orangeLight = new THREE.PointLight(0xFF8C00, 0.8, 50);
            orangeLight.position.set(15, 20, -150);
            scene.add(orangeLight);

            // Create player ball
            createBall();

            // Load jellyfish model for decorative pillars - MUST complete before createCourse()
            try {
                await loadJellyModel('assets/models/jellyfish.glb');
            } catch (err) {
                console.error('[INIT] Failed to load jellyfish model, course will use fallback geometry:', err);
            }

            // Create obstacle course (now jellyTemplate is guaranteed to be loaded)
            createCourse();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space') e.preventDefault();
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            // UI buttons
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('playAgainBtn').addEventListener('click', restartGame);

            // Render leaderboard on start screen
            renderLeaderboard();

            // Start render loop
            animate();
        }

        function createBall() {
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0xFF6B6B,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0xFF3333,
                emissiveIntensity: 0.5
            });
            ball = new THREE.Mesh(geometry, material);
            ball.castShadow = true;
            ball.position.set(0, 2, 0);
            scene.add(ball);
        }

        function createCourse() {
            // Starting platform
            createPlatform(0, 0, 0, 12, 1, 12, 0x4a90d9);
            createPlatformLabel('START', 0, 0, 0);

            // Main course platforms
            for (let i = 0; i < 20; i++) {
                const z = -15 - i * 10;
                const platformNumber = (i + 1) * 10;
                const hasBonus = Math.random() > 0.7;
                const bonusText = hasBonus ? ' +50' : '';
                let x = (Math.random() - 0.5) * 8;
                const platformIndex = platforms.length;

                if (i % 3 === 0) {
                    // Gap section - smaller platforms
                    let leftX = x - 5, rightX = x + 5;
                    let retries = 0;

                    while ((isPlatformOverlapping(new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(leftX, 0, z), new THREE.Vector3(4, 1, 8))) ||
                            isPlatformOverlapping(new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(rightX, 0, z), new THREE.Vector3(4, 1, 8)))) && retries < 5) {
                        x = (Math.random() - 0.5) * 8;
                        leftX = x - 5;
                        rightX = x + 5;
                        retries++;
                    }

                    createPlatform(leftX, 0, z, 4, 1, 8, 0x6c5ce7);
                    platformBonuses.push(hasBonus ? 50 : 0);
                    createPlatform(rightX, 0, z, 4, 1, 8, 0x6c5ce7);
                    platformBonuses.push(hasBonus ? 50 : 0);

                    createPlatformLabel(platformNumber.toString() + bonusText, leftX, 0, z);
                    createPlatformLabel(platformNumber.toString() + bonusText, rightX, 0, z);
                } else {
                    // Variable width based on difficulty progression
                    const difficultyFactor = Math.max(0.5, 1 - i * 0.02);
                    const width = 6 + Math.random() * 8 * difficultyFactor;

                    let retries = 0;
                    while (isPlatformOverlapping(new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(x, 0, z), new THREE.Vector3(width, 1, 8))) && retries < 5) {
                        x = (Math.random() - 0.5) * 8;
                        retries++;
                    }

                    createPlatform(x, 0, z, width, 1, 8, 0x4a90d9);
                    platformBonuses.push(hasBonus ? 50 : 0);

                    createPlatformLabel(platformNumber.toString() + bonusText, x, 0, z);

                    // 6% chance to make platform moving (skip first few and gap platforms)
                    if (i > 2 && i < 18 && Math.random() < 0.06) {
                        const lastPlatform = platforms[platforms.length - 1];
                        lastPlatform.isMoving = true;
                        lastPlatform.moveSpeed = 1 + Math.random() * 0.5;
                        lastPlatform.mesh.material.emissive.setHex(0x0033FF);
                        lastPlatform.mesh.material.emissiveIntensity = 0.3;
                    }

                    // 5% chance to spawn enemy on platform
                    if (i > 2 && i < 18 && Math.random() < 0.05) {
                        const enemyType = Math.random();
                        if (enemyType < 0.5) {
                            createEnemyType1(x, 1.5, z); // 50% - Static cat
                        } else if (enemyType < 0.9) {
                            createEnemyType2(x, 1.5, z); // 40% - Patrolling dog
                        } else {
                            createEnemyType3(x, 2.5, z); // 10% - Shooting bird
                        }
                    }
                }

                // Add obstacles
                if (i > 2 && Math.random() > 0.3) {
                    createObstacle(x, 1.5, z);
                }

                // Add moving obstacles
                if (i > 4 && Math.random() > 0.5) {
                    createMovingObstacle(x, 1.5, z - 2);
                }

                // Add collectibles
                if (Math.random() > 0.4) {
                    createCollectible(x + (Math.random() - 0.5) * 4, 3, z);
                }

                // Add ramps
                if (i % 4 === 2) {
                    createRamp(x, 0, z + 4);
                }
            }

            // Goal platform
            createPlatform(0, 0, -210, 15, 1, 15, 0x00b894);
            createGoalMarker(0, 2, -210);
            createPlatformLabel('GOAL', 0, 0, -210);

            // Add decorative elements
            const initialJellyCount = jellyInstances.length;
            for (let i = 0; i < 50; i++) {
                const x = (Math.random() - 0.5) * 60;
                const z = -Math.random() * courseLength;
                createPillar(x, z);
            }
            const finalJellyCount = jellyInstances.length;
            const createdCount = finalJellyCount - initialJellyCount;
            ModelVerification.markRendered('jellyfish-pillars', createdCount);
        }

        function isPlatformOverlapping(newBox) {
            for (let platform of platforms) {
                if (newBox.intersectsBox(platform.box)) {
                    return true;
                }
            }

        function resetGameState() {
            // Reset game state variables
            score = 0;
            lives = 3;
            gameOver = false;
            gameStarted = true;
            deepestZ = 0;
            gameStartTime = Date.now();
            collectedBonuses.clear();

            // Reset ball position and velocity
            ball.position.set(0, 2, 0);
            ballVelocity.set(0, 0, 0);

            // Clear any stuck key inputs
            keys = {};

            // Reset collectibles
            collectibles.forEach(c => {
                c.collected = false;
                c.mesh.visible = true;
            });

            // Reset obstacles to initial positions
            obstacles.forEach(obstacle => {
                if (obstacle.type === 'moving') {
                    obstacle.mesh.position.x = (obstacle.startX + obstacle.endX) / 2;
                    obstacle.direction = 1;
                }
            });

            // Reset falling and moving platforms
            platforms.forEach(platform => {
                platform.standingTime = 0;
                platform.isFalling = false;
                platform.mesh.position.y = platform.originalY;
                platform.moveDirection = 1;

                // Reset emissive (removes red warning or blue moving indicator)
                if (platform.isMoving) {
                    platform.mesh.material.emissive.setHex(0x0033FF);
                    platform.mesh.material.emissiveIntensity = 0.3;
                } else {
                    platform.mesh.material.emissive.setHex(0x000000);
                    platform.mesh.material.emissiveIntensity = 0;
                }

                platform.box.setFromObject(platform.mesh);
                if (!platform.mesh.parent) {
                    scene.add(platform.mesh);
                }
            });

            // Reset enemies
            enemies.forEach(enemy => {
                if (enemy.type === 2) {
                    enemy.mesh.position.x = (enemy.startX + enemy.endX) / 2;
                    enemy.direction = 1;
                    enemy.mesh.rotation.y = 0;
                }
                if (enemy.type === 3) {
                    enemy.lastShot = 0;
                }
            });

            // Clear bullets
            bullets.forEach(bullet => scene.remove(bullet.mesh));
            bullets = [];

            // Update UI
            updateUI();
        }

            camera.aspect = window.innerWidth / window.innerHeight;

        function update(delta) {
            if (!gameStarted || gameOver) return;

            // Apply gravity
            ballVelocity.y += gravity * delta;

            // Player input
            const inputForce = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) inputForce.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) inputForce.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) inputForce.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) inputForce.x += 1;
            
            if (inputForce.length() > 0) {
                inputForce.normalize();
                ballVelocity.x += inputForce.x * moveForce * delta;
                ballVelocity.z += inputForce.z * moveForce * delta;
            }

            // Apply friction
            ballVelocity.x *= friction;
            ballVelocity.z *= friction;

            // Clamp horizontal speed
            const horizontalSpeed = Math.sqrt(ballVelocity.x ** 2 + ballVelocity.z ** 2);
            if (horizontalSpeed > maxSpeed) {
                ballVelocity.x = (ballVelocity.x / horizontalSpeed) * maxSpeed;
                ballVelocity.z = (ballVelocity.z / horizontalSpeed) * maxSpeed;
            }

            // Update position
            ball.position.x += ballVelocity.x * delta;
            ball.position.y += ballVelocity.y * delta;
            ball.position.z += ballVelocity.z * delta;

            // Ball rotation based on velocity
            ball.rotation.x -= ballVelocity.z * delta * 2;
            ball.rotation.z += ballVelocity.x * delta * 2;

            // Platform collision
            let onGround = false;
            const ballBox = new THREE.Box3().setFromObject(ball);

            platforms.forEach((platform, platformIndex) => {
                platform.box.setFromObject(platform.mesh);
                if (ballBox.intersectsBox(platform.box)) {
                    // Check if ball is above platform (approaching from top)
                    if (ball.position.y > platform.mesh.position.y) {
                        // Also check that ball is within platform's XZ bounds
                        const platformGeom = platform.mesh.geometry.parameters;
                        const platformWidth = platformGeom.width;
                        const platformDepth = platformGeom.depth;
                        const platformX = platform.mesh.position.x;
                        const platformZ = platform.mesh.position.z;

                        const ballInXBounds = Math.abs(ball.position.x - platformX) <= platformWidth / 2 + 1;
                        const ballInZBounds = Math.abs(ball.position.z - platformZ) <= platformDepth / 2 + 1;

                        if (ballInXBounds && ballInZBounds) {
                            ball.position.y = platform.mesh.position.y + platform.mesh.geometry.parameters.height / 2 + 1;
                            ballVelocity.y = 0;
                            onGround = true;

                            // Collect platform bonus if available and not already collected
                            const bonus = platformBonuses[platformIndex];
                            if (bonus > 0 && !collectedBonuses.has(platformIndex)) {
                                score += bonus;
                                collectedBonuses.add(platformIndex);
                                updateUI();
                                console.log(`[BONUS] Collected +${bonus} on platform ${platformIndex}`);
                            }

                            // Track standing time (exclude start and goal platforms)
                            if (platformIndex > 0 && platformIndex < platforms.length - 1) {
                                if (!platform.isFalling) {
                                    platform.standingTime += delta;

                                    // Visual warning at 3.5 seconds
                                    if (platform.standingTime > 3.5) {
                                        const warnIntensity = (platform.standingTime - 3.5) / 0.5;
                                        platform.mesh.material.emissive.setHex(0xFF0000);
                                        platform.mesh.material.emissiveIntensity = Math.min(warnIntensity, 1);
                                    }

                                    // Platform falls after 4 seconds
                                    if (platform.standingTime > 4) {
                                        platform.isFalling = true;
                                        console.log(`[FALLING] Platform ${platformIndex} started falling`);
                                    }
                                }
                            }

                            // Jump
                            if (keys['Space']) {
                                ballVelocity.y = jumpForce;
                                onGround = false;
                                playSound('jump', 0.6);
                            }
                        }
                    }
                } else {
                    // Ball not on platform - reset standing time
                    if (!platform.isFalling) {
                        platform.standingTime = 0;
                        platform.mesh.material.emissive.setHex(0x000000);
                        platform.mesh.material.emissiveIntensity = 0;
                    }
                }
            });

            // Check platform progress for scoring
            if (ball.position.z < deepestZ) {
                deepestZ = ball.position.z;

                // Award points for progress: 10 points per unit of depth
                const progressPoints = Math.abs(Math.floor(deepestZ * 10));

                // Speed bonus: faster progression = more bonus
                const elapsedSeconds = (Date.now() - gameStartTime) / 1000;
                const speedBonus = Math.max(0, 100 - Math.floor(elapsedSeconds * 5)); // Max 100, decreases 5 per second

                const totalPoints = progressPoints + speedBonus;
                score += totalPoints;

                // Log for debugging
                console.log(`[SCORE] Reached z=${deepestZ.toFixed(2)}: +${progressPoints} progress + ${speedBonus} speed = ${totalPoints} total`);
                updateUI();
            }

            // Update moving obstacles
            obstacles.forEach(obstacle => {
                if (obstacle.type === 'moving') {
                    obstacle.mesh.position.x += obstacle.direction * obstacle.speed * delta;
                    if (obstacle.mesh.position.x > obstacle.endX) obstacle.direction = -1;
                    if (obstacle.mesh.position.x < obstacle.startX) obstacle.direction = 1;
                }
                obstacle.box.setFromObject(obstacle.mesh);
                
                // Check collision with ball
                if (ballBox.intersectsBox(obstacle.box)) {
                    lives--;
                    updateUI();
                    if (lives <= 0) {
                        showGameOver();
                    } else {
                        // Respawn slightly back
                        ball.position.z += 10;
                        ballVelocity.set(0, 0, 0);
                    }
                }
            });

            // Update falling platforms
            let platformsToRemove = [];
            platforms.forEach((platform, idx) => {
                if (platform.isFalling) {
                    const fallSpeed = 15;
                    platform.mesh.position.y -= fallSpeed * delta;
                    platform.box.setFromObject(platform.mesh);

                    // Remove from scene if fallen far enough
                    if (platform.mesh.position.y < -50) {
                        scene.remove(platform.mesh);
                        platformsToRemove.push(idx);
                    }
                }
            });

            // Remove fallen platforms from array (in reverse order to maintain indices)
            for (let i = platformsToRemove.length - 1; i >= 0; i--) {
                platforms.splice(platformsToRemove[i], 1);
            }

            // If ball is on a falling platform, bounce it up
            if (onGround) {
                for (let platform of platforms) {
                    if (platform.isFalling && ballBox.intersectsBox(platform.box)) {
                        ballVelocity.y = 10;
                        onGround = false;
                        break;
                    }
                }
            }

            // Update moving platforms
            platforms.forEach(platform => {
                if (platform.isMoving && !platform.isFalling) {
                    platform.mesh.position.y += platform.moveDirection * platform.moveSpeed * delta;

                    // Reverse direction at boundaries
                    if (platform.mesh.position.y >= platform.endY) {
                        platform.moveDirection = -1;
                        platform.mesh.position.y = platform.endY;
                    }
                    if (platform.mesh.position.y <= platform.startY) {
                        platform.moveDirection = 1;
                        platform.mesh.position.y = platform.startY;
                    }

                    // Update collision box
                    platform.box.setFromObject(platform.mesh);
                }
            });

            // Update enemies
            enemies.forEach((enemy, enemyIdx) => {
                // Type 2: Patrol movement
                if (enemy.type === 2) {
                    enemy.mesh.position.x += enemy.direction * enemy.speed * delta;
                    if (enemy.mesh.position.x >= enemy.endX) {
                        enemy.direction = -1;
                        enemy.mesh.rotation.y = Math.PI;
                    }
                    if (enemy.mesh.position.x <= enemy.startX) {
                        enemy.direction = 1;
                        enemy.mesh.rotation.y = 0;
                    }
                }

                // Type 3: Shooting
                if (enemy.type === 3) {
                    const now = Date.now();
                    if (now - enemy.lastShot > enemy.shootInterval) {
                        const dir = ball.position.clone().sub(enemy.mesh.position).normalize();
                        createBullet(enemy.mesh.position.x, enemy.mesh.position.y, enemy.mesh.position.z, dir);
                        playSound('shoot', 0.5);
                        enemy.lastShot = now;
                    }
                }

                // Update collision box
                enemy.box.setFromObject(enemy.mesh);

                // Check collision with ball
                if (ballBox.intersectsBox(enemy.box)) {
                    lives--;
                    playSoundWithCooldown('hit', 200);
                    updateUI();
                    if (lives <= 0) {
                        showGameOver();
                    } else {
                        ball.position.z += 10;
                        ballVelocity.set(0, 0, 0);
                    }
                }
            });

            // Update bullets
            let bulletsToRemove = [];
            bullets.forEach((bullet, bulletIdx) => {
                bullet.mesh.position.add(bullet.velocity.clone().multiplyScalar(delta));
                bullet.box.setFromObject(bullet.mesh);

                // Remove after 5 seconds
                if (Date.now() - bullet.createdAt > 5000) {
                    scene.remove(bullet.mesh);
                    bulletsToRemove.push(bulletIdx);
                    return;
                }

                // Check collision with ball
                if (ballBox.intersectsBox(bullet.box)) {
                    lives--;
                    updateUI();
                    scene.remove(bullet.mesh);
                    bulletsToRemove.push(bulletIdx);
                    if (lives <= 0) {
                        showGameOver();
                    } else {
                        ball.position.z += 10;
                        ballVelocity.set(0, 0, 0);
                    }
                }
            });

            // Remove bullets in reverse order
            for (let i = bulletsToRemove.length - 1; i >= 0; i--) {
                bullets.splice(bulletsToRemove[i], 1);
            }

            // Collectibles
            collectibles.forEach(collectible => {
                if (!collectible.collected) {
                    // Rotate and bob
                    collectible.mesh.rotation.y += delta * 2;
                    collectible.mesh.position.y = collectible.baseY + Math.sin(Date.now() * 0.003) * 0.3;
                    
                    // Check collection
                    const dist = ball.position.distanceTo(collectible.mesh.position);
                    if (dist < 1.5) {
                        collectible.collected = true;
                        collectible.mesh.visible = false;
                        score += 100;
                        playSound('collect', 0.7);
                        updateUI();
                    }
                }
            });

            // Check win condition
            if (ball.position.z < -205) {
                showWin();
            }

            // Fall off - respawn or game over (Y boundary or X boundary)
            if (ball.position.y < -20 || Math.abs(ball.position.x) > 30) {
                console.log('[DEBUG] Fall detected at y =', ball.position.y, 'x =', ball.position.x, 'lives before:', lives);
                lives--;
                playSoundWithCooldown('fall', 200);
                updateUI();
                if (lives <= 0) {
                    console.log('[DEBUG] Lives = 0, calling showGameOver()');
                    showGameOver();
                } else {
                    console.log('[DEBUG] Respawning, lives remaining:', lives);
                    ball.position.set(0, 2, Math.min(ball.position.z + 15, 0));
                    ballVelocity.set(0, 0, 0);
                }
            }

            // Update camera
            const cameraTargetX = ball.position.x * 0.3;
            const cameraTargetY = ball.position.y + 8;
            const cameraTargetZ = ball.position.z + 12;
            
            camera.position.x += (cameraTargetX - camera.position.x) * 0.05;
            camera.position.y += (cameraTargetY - camera.position.y) * 0.05;
            camera.position.z += (cameraTargetZ - camera.position.z) * 0.05;
            camera.lookAt(ball.position.x, ball.position.y + 1, ball.position.z - 5);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            updateStarfield(delta);
            update(delta);
            renderer.render(scene, camera);
        }

        // Expose model verification to window for debugging
        window.verifyModels = () => ModelVerification.logReport();
        window.getModelReport = () => ModelVerification.getReport();

        // Debug module for automated testing
        if (new URLSearchParams(location.search).get('debug') === '1') {
            window.GameDebug = {
                results: [],
                assert(name, condition) {
                    const status = condition ? 'PASS' : 'FAIL';
                    this.results.push({ name, status });
                    console[condition ? 'log' : 'error'](`[TEST ${status}] ${name}`);
                },
                async runAll() {
                    console.log('=== Running GameDebug Tests ===\n');

                    // Test 1: Start screen is visible initially
                    const startScreenInitial = !document.getElementById('startScreen').classList.contains('hidden');
                    this.assert('Start screen visible on load', startScreenInitial);

                    // Test 2: Game over screen is hidden initially
                    const gameOverInitial = document.getElementById('gameOverScreen').classList.contains('hidden');
                    this.assert('Game over screen hidden on load', gameOverInitial);

                    // Test 3: Click start button
                    console.log('Clicking start button...');
                    document.getElementById('startBtn').click();
                    await new Promise(r => setTimeout(r, 100));
                    const startScreenAfterClick = document.getElementById('startScreen').classList.contains('hidden');
                    this.assert('Start screen hidden after clicking start', startScreenAfterClick);

                    // Test 4: Game started flag
                    this.assert('gameStarted flag is true', gameStarted === true);

                    // Test 5: Score and lives reset
                    this.assert('Score reset to 0', score === 0);
                    this.assert('Lives reset to 3', lives === 3);

                    // Test 6: Ball position reset
                    this.assert('Ball at start position',
                        ball.position.x === 0 && ball.position.y === 2 && ball.position.z === 0);

                    // Test 7: Simulate falling off - drop ball below -20
                    console.log('Simulating fall...');
                    ballVelocity.y = -50; // High downward velocity
                    ball.position.y = -5; // Start above the threshold

                    // Need multiple frames to fall through and trigger collision
                    for (let i = 0; i < 10; i++) {
                        update(0.016);
                        console.log(`Frame ${i}: ball.y=${ball.position.y}, gameOver=${gameOver}, lives=${lives}`);
                        if (gameOver) break;
                    }
                    this.assert('Game over triggered when falling', gameOver === true);

                    // Test 8: Game over screen visible after fall
                    await new Promise(r => setTimeout(r, 50));
                    const gameOverVisible = !document.getElementById('gameOverScreen').classList.contains('hidden');
                    this.assert('Game over screen visible after death', gameOverVisible);

                    // Test 9: Restart button exists and is clickable
                    const restartBtn = document.getElementById('restartBtn');
                    this.assert('Restart button exists', restartBtn !== null);

                    // Test 10: Click restart
                    console.log('Clicking restart button...');
                    restartBtn.click();
                    await new Promise(r => setTimeout(r, 100));
                    this.assert('Game restarted (gameOver = false)', gameOver === false);

                    // Test 11: State clean after restart
                    this.assert('Score reset after restart', score === 0);
                    this.assert('Lives reset after restart', lives === 3);
                    this.assert('Ball respawned at start',
                        ball.position.x === 0 && ball.position.y === 2 && ball.position.z === 0);

                    // Test 12: Start screen visible again after restart
                    const startScreenAfterRestart = !document.getElementById('startScreen').classList.contains('hidden');
                    this.assert('Start screen visible after restart', startScreenAfterRestart);

                    // Test 13: Scoring system - progress increases score
                    console.log('\nTesting scoring system...');
                    document.getElementById('startBtn').click();
                    await new Promise(r => setTimeout(r, 100));

                    const scoreBeforeProgress = score;
                    // Move ball forward (more negative Z)
                    ball.position.z = -50;
                    deepestZ = -50;
                    update(0.016);
                    const scoreAfterProgress = score;
                    this.assert('Score increases with progress', scoreAfterProgress > scoreBeforeProgress);

                    // Test 14: Speed bonus - faster timing gives more points
                    // Reset and test with different times
                    gameStartTime = Date.now() - 2000; // Started 2 seconds ago
                    const scoreEarly = score;
                    ball.position.z = -100;
                    deepestZ = -100;
                    update(0.016);
                    const scoreWithEarlyTime = score;

                    // Reset with later time
                    score = 0;
                    gameStartTime = Date.now() - 10000; // Started 10 seconds ago
                    ball.position.z = -100;
                    deepestZ = -100;
                    update(0.016);
                    const scoreWithLateTime = score;

                    this.assert('Earlier completion has higher speed bonus', scoreWithEarlyTime > scoreWithLateTime);

                    // Test 15: Collectible bonus
                    console.log('Testing collectible scoring...');
                    const scoreBeforeCollectible = score;
                    if (collectibles.length > 0 && !collectibles[0].collected) {
                        // Move ball to collectible
                        ball.position.set(collectibles[0].mesh.position.x, collectibles[0].mesh.position.y, collectibles[0].mesh.position.z);
                        update(0.016);
                        const scoreAfterCollectible = score;
                        this.assert('Collectible adds 100 points', scoreAfterCollectible === scoreBeforeCollectible + 100);
                    } else {
                        this.assert('Collectible scoring (skip - no uncollected items)', true);
                    }

                    // Test 16: Leaderboard persistence
                    console.log('\nTesting leaderboard...');
                    // Clear leaderboard
                    localStorage.removeItem(LEADERBOARD_KEY);
                    let lb = getLeaderboard();
                    this.assert('Leaderboard empty after clear', lb.length === 0);

                    // Add some scores
                    addScore(500);
                    addScore(300);
                    addScore(700);
                    lb = getLeaderboard();
                    this.assert('Scores saved to leaderboard', lb.length === 3);

                    // Test 17: Scores sorted descending
                    this.assert('Scores sorted descending', lb[0].score === 700 && lb[1].score === 500 && lb[2].score === 300);

                    // Test 18: Leaderboard persists after reload (simulated)
                    const lbBefore = getLeaderboard();
                    saveLeaderboard(lbBefore);
                    const lbAfter = getLeaderboard();
                    this.assert('Leaderboard persists in localStorage', JSON.stringify(lbBefore) === JSON.stringify(lbAfter));

                    // Test 19: Leaderboard limited to top 10
                    localStorage.removeItem(LEADERBOARD_KEY);
                    for (let i = 0; i < 15; i++) {
                        addScore(1000 - i * 10);
                    }
                    lb = getLeaderboard();
                    this.assert('Leaderboard limited to top 10', lb.length === 10);

                    // Test 20: Leaderboard renders without errors
                    renderLeaderboard();
                    const tbody = document.getElementById('leaderboardBody');
                    this.assert('Leaderboard renders', tbody.children.length > 0);

                    // Summary
                    const passed = this.results.filter(r => r.status === 'PASS').length;
                    console.log(`\n=== ${passed}/${this.results.length} tests passed ===`);
                    if (passed !== this.results.length) {
                        console.log('\nFailed tests:');
                        this.results.filter(r => r.status === 'FAIL').forEach(r => {
                            console.error(`  ✗ ${r.name}`);
                        });
                    }
                }
            };

            // Run tests after game initializes
            setTimeout(() => window.GameDebug.runAll(), 500);
        }

        // Start
        init();
    </script>
</body>
</html>
